<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>แจ้งโอนเงิน</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    padding: 30px;
}
.box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    max-width: 420px;
    margin: auto;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
}
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #28a745;
    color: white;
    font-size: 16px;
    cursor: pointer;
}
button:disabled {
    background: gray;
    cursor: not-allowed;
}
</style>
</head>

<body>

<div class="box">
<h2>แจ้งโอนเงิน</h2>

<p><b>รายการ:</b> <span id="itemName"></span></p>

<p><b>ธนาคาร:</b> TTB</p>
<p><b>เลขบัญชี:</b> 921-7-80960-8</p>
<p><b>ชื่อบัญชี:</b> นาย กัมพล องการ</p>

<hr>

<label>ชื่อผู้โอน</label>
<input id="name" type="text" placeholder="กรอกชื่อผู้โอน">

<label>จำนวนเงิน (บาท)</label>
<input id="amount" type="number" placeholder="เช่น 500">

<label>รายละเอียดเพิ่มเติม</label>
<textarea id="note" rows="3"></textarea>

<label>แนบสลิปโอนเงิน</label>
<input type="file" id="slip" accept="image/*">

<button onclick="submitPayment()">ส่งแจ้งโอน</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBN02k5-YhZc1uitpEfMfVpsPLAPYKQs7A",
  authDomain: "myshop-c3983.firebaseapp.com",
  projectId: "myshop-c3983",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let currentUser = null;

// 🔐 เช็ค login
onAuthStateChanged(auth, (user) => {
  if (!user) {
    alert("กรุณา Login ก่อน");
    window.location.href = "login.html";
  } else {
    currentUser = user;
    document.getElementById("name").value =
      user.displayName || user.email;
  }
});

// 📦 ดึง set
const set = new URLSearchParams(location.search).get("set");
const itemName = set ? `ชุดคอม ${set}` : "-";
document.getElementById("itemName").innerText = itemName;

// 🔥 resize รูป
function resizeImage(file, callback) {
  const img = new Image();
  const reader = new FileReader();

  reader.onload = e => img.src = e.target.result;

  img.onload = function () {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const maxWidth = 600; // 🔥 ลดขนาด
    const scale = maxWidth / img.width;

    canvas.width = maxWidth;
    canvas.height = img.height * scale;

    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    callback(canvas.toDataURL("image/jpeg", 0.3)); // 🔥 ลดคุณภาพ
  };

  reader.readAsDataURL(file);
}

// 🚀 submit
window.submitPayment = function () {

  if (!currentUser) {
    alert("ยัง login ไม่เสร็จ");
    return;
  }

  const name = document.getElementById("name").value;
  const amount = document.getElementById("amount").value;
  const note = document.getElementById("note").value;
  const slip = document.getElementById("slip").files[0];

  if (!name || !amount || !slip) {
    alert("กรุณากรอกข้อมูลให้ครบ");
    return;
  }

  const btn = document.querySelector("button");
  btn.disabled = true;
  btn.innerText = "กำลังส่ง...";

  resizeImage(slip, function (base64Image) {

    // 🔥 ยิงข้อมูล (ไม่ต้องใส่ header)
    fetch("https://script.google.com/macros/s/AKfycbzC-ANHs7kFAam3RG8aKvA5FcnBoe6EheSDfPDpPwIbGwSOH_AbGLpCMkr3PRlMjv4/exec", {
      method: "POST",
      body: JSON.stringify({
        item: itemName || "-",
        name: name,
        amount: amount,
        note: note,
        //image: base64Image, // ✅ ใช้งานได้
        uid: currentUser.uid,
        status: "รอ",
        code: ""
      })
    });

    fetch("https://script.google.com/macros/s/AKfycbzC-ANHs7kFAam3RG8aKvA5FcnBoe6EheSDfPDpPwIbGwSOH_AbGLpCMkr3PRlMjv4/exec", {
      method: "POST",
      body: JSON.stringify({
        image: base64Image, // ✅ ใช้งานได้

      })
    });

    // 🔥 ไม่รอ response กันค้าง
    setTimeout(() => {
      alert("ส่งเรียบร้อย");
      window.location.href = "index.html";
    }, 1200);

  });
};
</script>

</body>
</html>
