<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>แจ้งโอนเงิน</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    padding: 30px;
}
.box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    max-width: 420px;
    margin: auto;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
}
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #28a745;
    color: white;
    font-size: 16px;
    cursor: pointer;
}
button:disabled {
    background: gray;
    cursor: not-allowed;
}
</style>
</head>

<body>

<div class="box">
<h2>แจ้งโอนเงิน</h2>

<p><b>รายการ:</b> <span id="itemName"></span></p>

<p><b>ธนาคาร:</b> TTB</p>
<p><b>เลขบัญชี:</b> 921-7-80960-8</p>
<p><b>ชื่อบัญชี:</b> นาย กัมพล องการ</p>

<hr>

<label>ชื่อผู้โอน</label>
<input id="name" type="text" placeholder="กรอกชื่อผู้โอน">

<label>จำนวนเงิน (บาท)</label>
<input id="amount" type="number" placeholder="เช่น 500">

<label>รายละเอียดเพิ่มเติม</label>
<textarea id="note" rows="3"></textarea>

<label>แนบสลิปโอนเงิน</label>
<input type="file" id="slip" accept="image/*">

<button onclick="submitPayment()">ส่งแจ้งโอน</button>
</div>

<script>
const set = new URLSearchParams(location.search).get("set");

const itemName = set
  ? `ชุดคอมพิวเตอร์ ชุดที่ ${set}`
  : "-";

document.getElementById("itemName").innerText = itemName;
    
function submitPayment() {
    const name = document.getElementById("name").value;
    const amount = document.getElementById("amount").value;
    const note = document.getElementById("note").value;
    const slip = document.getElementById("slip").files[0];

    if (!name || !amount || !slip) {
        alert("กรุณากรอกข้อมูลและแนบสลิปให้ครบ");
        return;
    }

    const reader = new FileReader();
    reader.onload = function () {
        fetch("https://script.google.com/macros/s/AKfycbxAO9wwc9eCbn4cQ8WUneFvfyzDKr9qglMcHSlEq19ISbmt-NYUNUzANHnHlaXgr2M-/exec", {
            method: "POST",
            body: JSON.stringify({
                item: item,
                name: name,
                amount: amount,
                note: note,
                image: reader.result
            })
        })
        .then(res => res.text())
        .then(() => {
    alert("ส่งข้อมูลเรียบร้อย รอตรวจสอบ");
    setTimeout(() => {
        window.location.href = "index.html";
    }, 2000);
})
        .catch(() => alert("เกิดข้อผิดพลาด"));
    };

    reader.readAsDataURL(slip);
    const btn = document.querySelector("button");
btn.disabled = true;
btn.innerText = "กำลังส่งข้อมูล...";
}



</script>

</body>
</html>
